
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIP-AA Integration Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
    }

    /* ── Header ── */
    .header {
      background: #1F4E79;
      color: white;
      padding: 14px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.3px;
    }
    .header p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 4px;
    }

    /* ── Mobile notice banner ── */
    .mobile-notice {
      display: none;
      background: #EBF5FB;
      border-left: 4px solid #2E75B6;
      padding: 10px 16px;
      font-size: 12px;
      color: #1A5276;
    }
    @media (max-width: 900px) {
      .mobile-notice { display: block; }
      .header h1 { font-size: 15px; }
    }

    /* ── Dashboard wrapper ── */
    /*
      On desktop  : fills 100% width, height tracks aspect ratio via padding-top.
      On mobile   : JS scales the 1200-wide iframe down to fit screen width,
                    then sets wrapper height to match the scaled result.
    */
    .dashboard-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      /* Desktop aspect ratio — adjust if your dashboard is taller/shorter */
      padding-top: 72%;
      background: #f0f4f8;
    }

    .dashboard-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      transform-origin: top left;
    }

    /* When JS kicks in for mobile, wrapper switches to fixed height */
    .dashboard-wrapper.scaled {
      padding-top: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>FIP–AA Integration Analytics Dashboard</h1>
    <p>Sahamati &nbsp;|&nbsp; Data updated daily at 09:55 IST</p>
  </div>

  <div class="mobile-notice">
    📱 For the best experience, view on a tablet or desktop.
    Rotate your phone to landscape for a wider view.
  </div>

  <div class="dashboard-wrapper" id="dashWrapper">
    <iframe
      id="dashFrame"
      src="https://analytics.zoho.in/open-view/211349000006251247/d787ff205ec11fd8304a3e1372ca4136f407a062b2a18ddd79810dbfcbf88018"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    /*
      Zoho Analytics dashboards are designed for ~1200px width.
      On screens narrower than that, we:
        1. Fix the iframe at 1200 × 900 px (its natural size)
        2. Scale it down proportionally so it fits the screen
        3. Set the wrapper height to match the scaled iframe height
      On desktop (≥ 1200px), we leave the CSS aspect-ratio approach in place.
    */

    const DASHBOARD_WIDTH  = 1200;  // px — Zoho dashboard natural width
    const DASHBOARD_HEIGHT = 900;   // px — Zoho dashboard natural height

    const wrapper = document.getElementById('dashWrapper');
    const iframe  = document.getElementById('dashFrame');

    function scaleDashboard() {
      const screenW = window.innerWidth;

      if (screenW < DASHBOARD_WIDTH) {
        // Mobile / small tablet — scale down
        const scale = screenW / DASHBOARD_WIDTH;
        const scaledHeight = DASHBOARD_HEIGHT * scale;

        iframe.style.position      = 'absolute';
        iframe.style.top           = '0';
        iframe.style.left          = '0';
        iframe.style.width         = DASHBOARD_WIDTH + 'px';
        iframe.style.height        = DASHBOARD_HEIGHT + 'px';
        iframe.style.transform     = 'scale(' + scale + ')';
        iframe.style.transformOrigin = 'top left';

        wrapper.classList.add('scaled');
        wrapper.style.height = scaledHeight + 'px';
      } else {
        // Desktop — reset to CSS aspect-ratio approach
        iframe.style.position      = 'absolute';
        iframe.style.top           = '0';
        iframe.style.left          = '0';
        iframe.style.width         = '100%';
        iframe.style.height        = '100%';
        iframe.style.transform     = 'none';

        wrapper.classList.remove('scaled');
        wrapper.style.height = '';
      }
    }

    // Run on load and on every resize / orientation change
    scaleDashboard();
    window.addEventListener('resize', scaleDashboard);
    window.addEventListener('orientationchange', function () {
      setTimeout(scaleDashboard, 300); // small delay for orientation to settle
    });
  </script>

</body>
</html>
