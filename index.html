<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIP-AA Integration Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
    }

    /* ── Header ── */
    .header {
      background: #1F4E79;
      color: white;
      padding: 14px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.3px;
    }
    .header p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 4px;
    }

    /* ── Mobile notice banner ── */
    .mobile-notice {
      display: none;
      background: #EBF5FB;
      border-left: 4px solid #2E75B6;
      padding: 10px 16px;
      font-size: 13px;
      color: #1A5276;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      .mobile-notice { display: block; }
      .header h1 { font-size: 15px; }
    }

    /* ── DESKTOP: aspect-ratio wrapper ── */
    .dashboard-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      padding-top: 72%;
      background: #f0f4f8;
    }
    .dashboard-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ── MOBILE: horizontal scroll at natural size so text is readable ── */
    @media (max-width: 900px) {
      .dashboard-wrapper {
        padding-top: 0;
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        height: auto;
      }
      .dashboard-wrapper iframe {
        position: relative;
        top: auto; left: auto;
        width: 1200px;    /* Zoho dashboard natural width */
        height: 2800px;   /* tall enough for all 5 reports + master table */
        display: block;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>FIP–AA Integration Analytics Dashboard</h1>
    <p>Sahamati &nbsp;|&nbsp; Data updated daily at 09:55 IST</p>
  </div>

  <div class="mobile-notice">
    📱 Scroll left/right to see the full dashboard. For the best experience, view on a tablet or desktop.
  </div>

  <div class="dashboard-wrapper">
    <iframe
      src="https://analytics.zoho.in/open-view/211349000006251247/d787ff205ec11fd8304a3e1372ca4136f407a062b2a18ddd79810dbfcbf88018"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
