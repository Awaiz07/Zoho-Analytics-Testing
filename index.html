<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIP-AA Integration Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
    }
    .header {
      background: #1F4E79;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: bold;
    }
    .header p {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
    /* Mobile note — only visible on small screens */
    .mobile-note {
      display: none;
      background: #EBF5FB;
      border-left: 4px solid #2E75B6;
      padding: 10px 16px;
      font-size: 13px;
      color: #1A5276;
    }
    @media (max-width: 768px) {
      .mobile-note { display: block; }
    }
    .dashboard-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      padding-top: 75%;
    }
    .dashboard-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Mobile adjustments */
    @media (max-width: 768px) {
      .header h1 { font-size: 15px; }
      .dashboard-wrapper { padding-top: 150%; }
    }
    .footer {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: #888;
      background: white;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="header">
    <p>Sahamati  |  Updated daily at 09:55 IST</p>
  </div>
  <div class="mobile-note">
    📱 For a better experience, rotate your phone to landscape mode or open on a tablet / desktop.
  </div>
  <div class="dashboard-wrapper">
    <iframe
      src=https://analytics.zoho.in/open-view/211349000006251247/d787ff205ec11fd8304a3e1372ca4136f407a062b2a18ddd79810dbfcbf88018
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
